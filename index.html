<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Project Amos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>

body{
margin:0;
font-family:Consolas, monospace;
color:white;
overflow:hidden;
background-image:url('https://res.cloudinary.com/dkisbfx29/image/upload/v1774063840/xtlhuxktv9dz1yj65whx.png');
background-size:120%;
background-position:50% 50%;
background-attachment:fixed;
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.85));
z-index:-1;
}

/* STARS */
#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* HEADER */
.header{
height:50px;
display:flex;
align-items:center;
padding-left:15px;
border-bottom:1px solid #00ff9f33;
background:rgba(0,0,0,0.4);
}

/* LAYOUT */
.container{
display:flex;
height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar{
width:70px;
border-right:1px solid #00ff9f33;
display:flex;
flex-direction:column;
align-items:center;
padding-top:15px;
gap:20px;
background:rgba(0,0,0,0.4);
}

.sideicon{
font-size:22px;
cursor:pointer;
opacity:0.7;
transition:0.2s;
}
.sideicon:hover{
opacity:1;
color:#00ff9f;
transform:scale(1.2);
}

/* CONTENT */
.content{
flex:1;
display:grid;
grid-template-columns:2fr 1fr;
grid-template-rows:1fr 1fr;
gap:10px;
padding:10px;
overflow:auto;
}

/* PANEL */
.panel{
border:1px solid #00ff9f33;
padding:10px;
overflow:auto;
background:rgba(2,6,23,0.6);
backdrop-filter:blur(6px);
}

.panel-title{
color:#00ff9f;
margin-bottom:10px;
}

/* GRID MENU */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.app{
background:#0f172a;
padding:12px;
border-radius:8px;
text-align:center;
cursor:pointer;
border:1px solid #00ff9f22;
}
.app:hover{
border:1px solid #00ff9f;
box-shadow:0 0 10px #00ff9f55;
}

a{color:white;text-decoration:none;}

#terminal{
font-size:12px;
line-height:18px;
color:#00ff9f;
}

#monitor{
font-size:13px;
line-height:20px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="header">🚀 My Project Amos – Developer Dashboard</div>

<div class="container">

<div class="sidebar">
<div class="sideicon">📁</div>
<div class="sideicon">🌐</div>
<div class="sideicon">🤖</div>
<div class="sideicon">📊</div>
<div class="sideicon">⚙️</div>
<div class="sideicon">👤</div>
</div>

<div class="content">

<!-- PROJECT PANEL -->
<div class="panel">
<div class="panel-title">Projects</div>
<div class="grid">

<a href="https://amosmarbun86-droid.github.io/camera-Rcp-pro/" target="_blank"><div class="app">📸 Camera</div></a>
<a href="https://amosmarbun86-droid.github.io/fake-gps-map/" target="_blank"><div class="app">🗺 Fake GPS</div></a>
<a href="https://amosmarbun86-droid.github.io/smartdebt-system/" target="_blank"><div class="app">💰 SmartDebt</div></a>
<a href="https://alarm-telegram-24jam.onrender.com" target="_blank"><div class="app">🚨 Alarm</div></a>
<a href="https://t.me/routealarmsiborong2026_bot" target="_blank"><div class="app">🤖 Bot</div></a>
<a href="https://amosmarbun86-droid.github.io/data-pribadi/" target="_blank"><div class="app">📂 Data</div></a>

</div>
</div>

<!-- TERMINAL -->
<div class="panel">
<div class="panel-title">Terminal Log</div>
<div id="terminal"></div>
</div>

<!-- SYSTEM MONITOR -->
<div class="panel">
<div class="panel-title">System Monitor</div>
<div id="monitor"></div>
</div>

<!-- STATUS -->
<div class="panel">
<div class="panel-title">Server Status</div>
<div id="status"></div>
</div>

</div>
</div>

<script>

/* STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,d:Math.random()});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=s.d;
if(s.y>canvas.height)s.y=0;
}}
setInterval(draw,33);

/* TERMINAL LOG */
const logs=[
"Server connected",
"Loading modules",
"Camera RCP Ready",
"Fake GPS Ready",
"SmartDebt System Online",
"Alarm Route Running",
"Telegram Bot Connected",
"All Systems Normal"
];

let logIndex=0;
setInterval(()=>{
if(logIndex<logs.length){
document.getElementById("terminal").innerHTML+=
"[ "+new Date().toLocaleTimeString()+" ] "+logs[logIndex]+"<br>";
logIndex++;
}
},1500);

/* SYSTEM MONITOR */
setInterval(()=>{
document.getElementById("monitor").innerHTML=
"CPU Usage : "+Math.floor(Math.random()*60+20)+"%<br>"+
"RAM Usage : "+Math.floor(Math.random()*60+20)+"%<br>"+
"Network   : Stable<br>"+
"Server    : Online<br>"+
"Time      : "+new Date().toLocaleTimeString();
},1000);

/* STATUS PANEL */
setInterval(()=>{
document.getElementById("status").innerHTML=
"Status : Running<br>"+
"Projects : Active<br>"+
"Version : Dashboard V3<br>"+
"User : Amos Marbun";
},2000);

</script>

</body>
</html>
