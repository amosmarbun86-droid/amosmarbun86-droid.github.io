<style>

/* ===== LOADER HACKER ===== */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9f;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-family:monospace;
font-size:14px;
text-align:left;
padding:20px;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff9f;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* ===== BODY ===== */
body{
font-family:Consolas, monospace;
background:#020617;
color:white;
margin:0;
overflow:hidden;
}

/* ===== HEADER ===== */
.header{
height:50px;
display:flex;
align-items:center;
padding-left:15px;
background:#020617;
border-bottom:1px solid #00ff9f33;
}

/* ===== LAYOUT ===== */
.container{
display:flex;
height:calc(100vh - 50px);
}

/* ===== SIDEBAR ===== */
.sidebar{
width:70px;
background:#020617;
border-right:1px solid #00ff9f33;
display:flex;
flex-direction:column;
align-items:center;
padding-top:15px;
gap:20px;
}

.sideicon{
font-size:22px;
cursor:pointer;
opacity:0.7;
transition:0.2s;
}

.sideicon:hover{
opacity:1;
color:#00ff9f;
transform:scale(1.2);
}

/* ===== CONTENT ===== */
.content{
flex:1;
overflow:auto;
}

/* STATUS BAR */
.statusbar{
display:flex;
gap:20px;
padding:8px;
font-size:12px;
border-bottom:1px solid #00ff9f22;
}

/* GRID MENU */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:18px;
padding:20px;
}

/* CARD */
.app{
background:rgba(15,23,42,0.9);
border-radius:12px;
padding:18px;
transition:0.25s;
cursor:pointer;
border:1px solid rgba(0,255,159,0.2);
text-align:center;
}

.app:hover{
transform:translateY(-5px);
border:1px solid #00ff9f;
box-shadow:0 0 15px #00ff9f55;
}

.icon{
font-size:32px;
margin-bottom:8px;
}

a{
text-decoration:none;
color:white;
}

/* FOOTER */
.footer{
text-align:center;
padding:15px;
opacity:0.6;
font-size:12px;
}

/* INSTALL BUTTON */
#installBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
display:none;
z-index:999;
}

</style>

<script>

/* SOUND */
function playSound(){
document.getElementById("clickSound").play();
}

/* HACKER BOOT LOADER */
const lines=[
"Booting Amos OS...",
"Loading modules...",
"Connecting server...",
"Authorizing access...",
"Access Granted ✔",
"Launching Dashboard..."
];

let i=0,j=0;
function type(){
if(i<lines.length){
if(j<lines[i].length){
document.getElementById("text").innerHTML+=lines[i][j];
j++;
setTimeout(type,30);
}else{
document.getElementById("text").innerHTML+="<br>";
i++;j=0;
setTimeout(type,200);
}
}else{
setTimeout(()=>{loader.style.display="none";},600);
}}
type();

/* CLOCK */
setInterval(()=>{
const now=new Date();
document.getElementById("clock").innerHTML=
now.toLocaleTimeString();
},1000);

/* INSTALL PWA */
let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.onclick=async()=>{
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
}
};

/* SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker
.register("sw.js?v="+Date.now())
.then(reg=>{
reg.update();
setInterval(()=>reg.update(),60000);
});
}

</script>
