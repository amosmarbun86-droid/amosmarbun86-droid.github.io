<style>

overflow:hidden;
background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* LOGIN */
#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:30px;
border:1px solid #00ff9f;
text-align:center;
}

/* DESKTOP */
#desktop{

width:100vw;
height:100vh;
}

/* ICON */
.icon{
width:90px;
text-align:center;
cursor:pointer;
margin:10px;
display:inline-block;
}

/* WINDOW */
.window{
position:absolute;
width:600px;
height:350px;
background:black;
border:1px solid #00ff9f;
display:none;
box-shadow:0 0 10px #00ff9f55;
transition:all 0.3s;
}

.titlebar{
background:#001a12;
padding:5px;
display:flex;
justify-content:space-between;
cursor:move;
}

.controls button{
background:black;
color:#00ff9f;
border:none;
cursor:pointer;
margin-left:5px;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:35px;
background:black;
display:flex;
justify-content:space-between;
padding:5px;
border-top:1px solid #00ff9f;
}
</style>
</head>

<!-- TERMINAL -->
<div class="window" id="terminal">
<div class="titlebar">Terminal
<div class="controls">
<button onclick="minimizeApp('terminal')">—</button>
<button onclick="maximizeApp('terminal')">⬜</button>
<button onclick="closeApp('terminal')">✕</button>
</div>
</div>
<div id="terminalOutput" style="height:80%;overflow:auto"></div>
<input id="cmdInput" style="width:100%;background:black;color:#0f0;border:none"
onkeydown="runCmd(event)">
</div>

<!-- TASKBAR -->
<div id="taskbar">
<div>AMOS WEB OS</div>
<div id="clock"></div>
</div>

<script>
function login(){
if(document.getElementById("pass").value==="123"){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="block";
}else{
alert("Password salah");
}
}

function openApp(id){
document.getElementById(id).style.display="block";
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

function minimizeApp(id){
document.getElementById(id).style.display="none";
}

function maximizeApp(id){
let win=document.getElementById(id);
win.style.top="0";
win.style.left="0";
win.style.width="100%";
win.style.height="90%";
}

function openExternal(url){
window.open(url,"_blank");
}

function changeMusic(src){
document.getElementById("player").src=src;
document.getElementById("player").play();
}

/* NOTES SAVE */
notesArea.value=localStorage.getItem("amos_notes")||"";
notesArea.addEventListener("input",()=>{
localStorage.setItem("amos_notes",notesArea.value);
});

/* TERMINAL */
function runCmd(e){
if(e.key==="Enter"){
let cmd=cmdInput.value;
let out=document.getElementById("terminalOutput");

if(cmd==="help") out.innerHTML+="<br>help time clear about";
else if(cmd==="time") out.innerHTML+="<br>"+new Date();
else if(cmd==="about") out.innerHTML+="<br>AMOS WEB OS V6";
else if(cmd==="clear"){ out.innerHTML=""; cmdInput.value=""; return;}
else out.innerHTML+="<br>Command not found";

cmdInput.value="";
}
}

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
},1000);
</script>
