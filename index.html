<!DOCTYPE html>
<html lang="id">
<head>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Consolas, monospace;
background:url('https://res.cloudinary.com/dkisbfx29/image/upload/v1775192201/xvl7e4phlhxz3urcq6xl.png') no-repeat center center fixed;
background-size:cover;
color:#00ff9f;
overflow:hidden;
}

/* MATRIX */
#bgCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:0;
pointer-events:none;
}

/* LOGIN */
#login{
position:fixed;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
z-index:999;
flex-direction:column;
}

#desktop{
display:none;
width:100vw;
height:100vh;
flex-direction:row;
}

/* SIDEBAR */
#sidebar{
width:220px;
background:rgba(0,2,23,0.9);
border-right:1px solid #00ff9f55;
padding:10px;
overflow:auto;
}

.side-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #003322;
}

.side-item:hover{
background:#001a12;
}

.side-item i{margin-right:8px}

/* WINDOW */
.window{
position:absolute;
width:90%;
max-width:600px;
height:70%;
background:rgba(0,2,23,0.95);
border:1px solid #00ff9f;
display:none;
flex-direction:column;
resize:both;
overflow:auto;
}

.titlebar{
background:black;
padding:5px;
cursor:move;
display:flex;
justify-content:space-between;
}

/* TASKBAR */
#taskbar{
position:absolute;
bottom:0;
width:100%;
height:35px;
background:rgba(0,2,23,0.95);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
}

#startMenu{
position:absolute;
bottom:35px;
left:0;
width:200px;
background:rgba(0,2,23,0.95);
display:none;
flex-direction:column;
}

textarea,#terminalOutput{
width:100%;
height:calc(100% - 30px);
background:black;
color:#0f0;
border:none;
}

.file{padding:6px;border-bottom:1px solid #003322;cursor:pointer;}
.file:hover{background:#001a12;}
</style>
</head>

<body>

<div id="sidebar">

<div class="side-item" onclick="openExternal('https://amosmarbun86-droid.github.io/cv-amos/')"><i class="fa-solid fa-user"></i> CV Amos</div>
<div class="side-item" onclick="openExternal('https://amosmarbun86-droid.github.io/data-pribadi/')"><i class="fa-solid fa-folder"></i> Data Pribadi</div>
<div class="side-item" onclick="openExternal('https://amosmarbun86-droid.github.io/data-pribadi/admin.html')"><i class="fa-solid fa-gear"></i> Admin Panel</div>
<div class="side-item" onclick="openExternal('https://amosmarbun86-droid.github.io/smartdebt-system/')"><i class="fa-solid fa-coins"></i> SmartDebt</div>
<div class="side-item" onclick="openExternal('https://alarm-telegram-24jam.onrender.com')"><i class="fa-solid fa-clock"></i> Alarm</div>
<div class="side-item" onclick="openExternal('https://jadwal-kerja-eqhfsftfwps6axdunrghan.streamlit.app')"><i class="fa-solid fa-calendar"></i> Jadwal</div>
<div class="side-item" onclick="openExternal('https://amosmarbun86-droid-form-wilayah-spx-sbb-mainkode-wemahi.streamlit.app/')"><i class="fa-solid fa-file"></i> Form</div>
<div class="side-item" onclick="openExternal('https://t.me/routealarmsiborong2026_bot')"><i class="fa-brands fa-telegram"></i> Telegram Bot</div>

<hr>

<div class="side-item" onclick="openApp('notes')">Notes</div>
<div class="side-item" onclick="openApp('music')">Music</div>
<div class="side-item" onclick="openApp('terminal')">Terminal</div>

</div>

<div id="workspace">

<div class="window" id="notes">
<div class="titlebar">Notes <span onclick="closeApp('notes')">X</span></div>
<textarea id="notesArea"></textarea>
</div>

<div class="window" id="terminal">
<div class="titlebar">Terminal <span onclick="closeApp('terminal')">X</span></div>
<div id="terminalOutput"></div>
<input id="cmdInput">
</div>

<div class="window" id="music">
<div class="titlebar">Music <span onclick="closeApp('music')">X</span></div>

<input type="file" id="musicFile">

<br><br>

<input type="text" id="musicUrl" placeholder="Paste URL GitHub di sini">
<button onclick="addMusicUrl()">Tambah dari URL</button>

<audio id="player" controls></audio>
<div id="musicList"></div>
</div>

<div class="window" id="fileManager">
<div class="titlebar">File Manager <span onclick="closeApp('fileManager')">X</span></div>
<button onclick="switchFolder('note')">📁 Note</button>
<button onclick="switchFolder('webos')">📁 WebOS</button>
<button onclick="createFile()">➕ New</button>
<div id="fileManagerContent"></div>
</div>

</div>

<div id="taskbar">
<div onclick="toggleStart()">Start</div>
<div id="clock"></div>
</div>

<div id="startMenu">
<div onclick="openApp('notes')">Notes</div>
<div onclick="openApp('music')">Music</div>
<div onclick="openApp('terminal')">Terminal</div>
<div onclick="openApp('fileManager')">File Manager</div>
<div onclick="toggleBgEffect()">Toggle Matrix</div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIza...",
authDomain:"amos-web-os.firebaseapp.com",
projectId:"amos-web-os"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* FIX VARIABLE (WAJIB) */
const player = document.getElementById("player");
const musicList = document.getElementById("musicList");
const musicFile = document.getElementById("musicFile");
const fileManagerContent = document.getElementById("fileManagerContent");
const clock = document.getElementById("clock");
const startMenu = document.getElementById("startMenu");

const pass=document.getElementById("pass");
const desktop=document.getElementById("desktop");
const loginBox=document.getElementById("login");

function login(){
if(pass.value==="123"){
loginBox.style.display="none";
desktop.style.display="flex";
loadFiles();
loadMusic();
}else alert("PIN salah");
}

function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.left=Math.random()*200+"px";
w.style.top=Math.random()*150+"px";
if(id==="fileManager") loadFiles();
if(id==="music") loadMusic();
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

function openExternal(url){
window.open(url,"_blank");
}

/* MUSIC FIXED */
function loadMusic(){
musicList.innerHTML="";
db.collection("files").where("folder","==","music").get().then(snap=>{
snap.forEach(doc=>{
let d=doc.data();
let div=document.createElement("div");
div.textContent="▶ "+d.name;

div.onclick=()=>{
player.src = d.url;
player.load();
player.oncanplay = () => player.play();
};

musicList.appendChild(div);
});
});
}

musicFile.onchange=function(){
const file=this.files[0];
if(file){
player.src=URL.createObjectURL(file);
player.play();
}
};

/* FILE MANAGER */
let currentFolder="note";
function loadFiles(){
fileManagerContent.innerHTML="Folder: "+currentFolder+"<hr>";
db.collection("files").where("folder","==",currentFolder).get().then(snap=>{
snap.forEach(doc=>{
let d=doc.data();
let div=document.createElement("div");
div.className="file";
div.textContent=d.name;
fileManagerContent.appendChild(div);
});
});
}

function createFile(){
let name=prompt("Nama file:");
let content=prompt("Isi:");
if(!name)return;
db.collection("files").add({folder:currentFolder,name,content}).then(loadFiles);
}

function switchFolder(f){
currentFolder=f;
loadFiles();
}

/* CLOCK */
setInterval(()=>{clock.innerHTML=new Date().toLocaleTimeString();},1000);

/* START */
function toggleStart(){
startMenu.style.display=startMenu.style.display==="flex"?"none":"flex";
}

/* MATRIX */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let columns=canvas.width/20;
let drops=[];
for(let i=0;i<columns;i++)drops[i]=1;
let showMatrix=true;

function toggleBgEffect(){showMatrix=!showMatrix;}

function drawMatrix(){
if(!showMatrix){
ctx.clearRect(0,0,canvas.width,canvas.height);
requestAnimationFrame(drawMatrix);
return;
}
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0f0";
ctx.font="15px monospace";

for(let i=0;i<drops.length;i++){
let text=String.fromCharCode(33+Math.random()*94);
ctx.fillText(text,i*20,drops[i]*20);
if(drops[i]*20>canvas.height) drops[i]=0;
drops[i]++;
}
requestAnimationFrame(drawMatrix);
}
drawMatrix();

function addMusicUrl(){
  let url = document.getElementById("musicUrl").value;

  if(!url){
    alert("Masukkan URL dulu!");
    return;
  }

  let name = prompt("Nama lagu:");
  if(!name) return;

  db.collection("files").add({
    folder: "music",
    name: name,
    url: url
  }).then(()=>{
    alert("Lagu ditambahkan!");
    loadMusic();
  });
  }
</script>

</body>
</html>
