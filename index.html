/* WORKSPACE */

flex:1;

.titlebar{

display:flex;
justify-content:space-between;
}

/* TASKBAR */
#taskbar{

bottom:0;
width:100%;
height:35px;
background:rgba(0,2,23,0.95);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
border-top:1px solid #00ff9f33;
}
#startBtn{
cursor:pointer;
padding:5px;
border:1px solid #00ff9f;
}
#startMenu{
position:absolute;
bottom:35px;
left:0;
width:200px;
background:rgba(0,2,23,0.95);
display:none;
flex-direction:column;
border:1px solid #00ff9f33;
}
.start-item{
padding:10px;
border-bottom:1px solid #003322;
cursor:pointer;
}
.start-item:hover{
background:#001a12;
}

/* TEXTAREA / TERMINAL */
textarea, #terminalOutput{
width:100%;
height:calc(100% - 30px);
background:black;
color:#0f0;
border:none;
}

/* MATRIX */
#bgCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:0;
pointer-events:none;
}
/* FILE MANAGER */
#fileManagerContent{
margin-top:10px;
max-height:300px;
overflow:auto;
font-size:13px;
}

.file{
padding:6px;
border-bottom:1px solid #003322;
cursor:pointer;
color:#00ff9f;
}

}

Window Color

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD2QRiYnyHWRqG3OgZcWV9YA1arXPsvoE0",
  authDomain: "amos-web-os.firebaseapp.com",
  projectId: "amos-web-os",
  storageBucket: "amos-web-os.firebasestorage.app",
  messagingSenderId: "59843745100",
  appId: "1:59843745100:web:b29e5996052a3bf5672be9",
  measurementId: "G-Z2F7MXPSCH"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script>
/* LOGIN */
function login(){
if(document.getElementById("pass").value==="123"){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="flex";
loadNotes();
}else alert("PIN salah");
}

/* WINDOWS */
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.left="150px";
w.style.top="80px";
w.style.zIndex=parseInt(Date.now()/1000);
}
function closeApp(id){document.getElementById(id).style.display="none";}
function openExternal(url){
window.open(url, "_blank");
}

/* START MENU */
function toggleStartMenu(){
let m=document.getElementById("startMenu");
m.style.display=(m.style.display==="flex")?"none":"flex";
m.style.flexDirection="column";
}

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerHTML =
new Date().toLocaleTimeString();
},1000);

/* NOTES FIREBASE */
const notesArea=document.getElementById("notesArea");

function loadNotes(){
db.collection("notes").doc("main").get().then(doc=>{
if(doc.exists){notesArea.value=doc.data().isi;}
});
}

function saveNotes(){
db.collection("notes").doc("main").set({
isi:notesArea.value,
updated:new Date()
});
}
notesArea.addEventListener("input",saveNotes);

/* TERMINAL */
function runCmd(e){
if(e.key==="Enter"){
let cmd=cmdInput.value;
let out=terminalOutput;
if(cmd==="help") out.innerHTML+="<br>help, time, clear";
else if(cmd==="time") out.innerHTML+="<br>"+new Date();
else if(cmd==="clear") out.innerHTML="";
cmdInput.value="";
}
}

/* WINDOW COLOR */
windowColorPicker.addEventListener("input",(e)=>{
document.querySelectorAll(".window").forEach(w=>{
w.style.borderColor=e.target.value;
});
});

/* MATRIX */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let columns=canvas.width/20;
let drops=[];
for(let x=0;x<columns;x++)drops[x]=1;
let showMatrix=true;
function toggleBgEffect(){showMatrix=!showMatrix;}
function drawMatrix(){
if(!showMatrix){ctx.clearRect(0,0,canvas.width,canvas.height);requestAnimationFrame(drawMatrix);return;}
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0f0";
ctx.font="15px monospace";
for(let i=0;i<drops.length;i++){
const text=String.fromCharCode(33+Math.random()*94);
ctx.fillText(text,i*20,drops[i]*20);
if(drops[i]*20>canvas.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
}
requestAnimationFrame(drawMatrix);
}
drawMatrix();

/* MUSIC PLAYER */
document.getElementById('musicFile').addEventListener('change', function(){
  const file = this.files[0];
  if(file){
    const url = URL.createObjectURL(file);
    const player = document.getElementById('player');
    player.src = url;
    player.play();
  }
});

/* FILE MANAGER */
const fileInput=document.getElementById("fileInput");
const fileList=document.getElementById("fileManagerContent");

fileInput.addEventListener("change",()=>{
fileList.innerHTML="";
for(const f of fileInput.files){
let div=document.createElement("div");
div.className="file";
div.textContent=f.name;
fileList.appendChild(div);
}
});
/* DRAG WINDOW */
document.querySelectorAll(".window").forEach(win=>{
  const title = win.querySelector(".titlebar");
  let offsetX = 0;
  let offsetY = 0;
  let isDown = false;

  title.addEventListener("mousedown", (e)=>{
    isDown = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
    win.style.zIndex = 1000;
  });

  document.addEventListener("mouseup", ()=>{
    isDown = false;
  });

  document.addEventListener("mousemove", (e)=>{
    if(!isDown) return;
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  });
});
</script>

</body>
