<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Project Amos</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">

<style>

/* LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9f;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-family:monospace;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff9f;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

/* BODY */
body{
font-family:Arial;
background-image:url('https://res.cloudinary.com/dkisbfx29/image/upload/v1774063840/xtlhuxktv9dz1yj65whx.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
text-align:center;
margin:0;
overflow-x:hidden;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85));
z-index:-2;
}

/* STARS */
#stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */
.header{
padding:40px;
font-size:36px;
font-weight:bold;
}

.sub{
opacity:0.8;
margin-bottom:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

/* CARD */
.app{
background:rgba(30,41,59,0.75);
border-radius:20px;
padding:25px;
transition:0.3s;
cursor:pointer;
backdrop-filter:blur(8px);
}

.app:hover{
transform:translateY(-8px) scale(1.03);
background:rgba(51,65,85,0.9);
}

.icon{
font-size:48px;
margin-bottom:10px;
}

a{
text-decoration:none;
color:white;
}

.footer{
margin-top:20px;
padding:20px;
opacity:0.7;
}

/* INSTALL BUTTON */
#installBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
display:none;
z-index:999;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div id="text"></div><span class="cursor"></span>
</div>

<!-- STARS -->
<canvas id="stars"></canvas>

<div class="header">🚀 My Project Amos</div>
<div class="sub">Developer Dashboard</div>

<div class="grid">

<a href="https://jadwal-kerja-eqhfsftfwps6axdunrghan.streamlit.app" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">📅</div>Jadwal Kerja</div>
</a>

<a href="https://amosmarbun86-droid.github.io/fake-gps-map/" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">🗺</div>Fake GPS Map</div>
</a>

<a href="https://amosmarbun86-droid.github.io/cv-amos/" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">👨‍💻</div>CV Amos</div>
</a>

<a href="https://t.me/routealarmsiborong2026_bot" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">🤖</div>Telegram Bot</div>
</a>

<a href="https://alarm-telegram-24jam-production.up.railway.app" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">🚨</div>Alarm Route Web</div>
</a>

<a href="https://amosmarbun86-droid-form-wilayah-spx-sbb-mainkode-wemahi.streamlit.app/" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">📍</div>Form Wilayah SPX</div>
</a>

<a href="https://amosmarbun86-droid.github.io/data-pribadi/" target="_blank">
<div class="app" onclick="playSound()"><div class="icon">📂</div>Data Pribadi</div>
</a>

</div>

<div class="footer">© 2026 Amos Marbun Projects</div>

<!-- INSTALL BUTTON -->
<button id="installBtn">⬇ Install App</button>

<!-- SOUND -->
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>

/* SOUND */
function playSound(){
document.getElementById("clickSound").play();
}

/* HACKER TYPING */
const lines = [
"> Initializing system...",
"> Connecting to server...",
"> Access granted ✔",
"> Loading Amos Dashboard..."
];

let i=0,j=0;

function type(){
if(i<lines.length){
if(j<lines[i].length){
document.getElementById("text").innerHTML+=lines[i][j];
j++;
setTimeout(type,40);
}else{
document.getElementById("text").innerHTML+="<br>";
i++; j=0;
setTimeout(type,300);
}
}else{
setTimeout(()=>{document.getElementById("loader").style.display="none";},800);
}
}
type();

/* STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,d:Math.random()});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=s.d;
if(s.y>canvas.height){s.y=0;}
}
}
setInterval(draw,33);

/* PWA INSTALL */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").onclick=async()=>{
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt=null;
}
};

/* SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
