<link rel="apple-touch-icon" href="icon-192.png">

<style>

/* ===== SEMUA STYLE LAMA TETAP ===== */

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff9f;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
font-family:monospace;
}

.cursor{
display:inline-block;
width:10px;
background:#00ff9f;
animation:blink 1s infinite;
}

@keyframes blink{
0%,50%,100%{opacity:1;}
25%,75%{opacity:0;}
}

body{
font-family:Arial;
background-image:url('https://res.cloudinary.com/dkisbfx29/image/upload/v1774063840/xtlhuxktv9dz1yj65whx.png');
background-size:120%;
background-position:50% 50%;
background-repeat:no-repeat;
background-attachment:fixed;
animation:fadeIn 1.5s ease;
color:white;
text-align:center;
margin:0;
overflow-x:hidden;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.65));
z-index:-1;
pointer-events:none;
}

#stars{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:-2;
transition:0.2s;
}

.header{padding:40px;font-size:36px;font-weight:bold;}
.sub{opacity:0.85;margin-bottom:20px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
transition:0.2s;
}

.app{
background:rgba(15,23,42,0.85);
border-radius:20px;
padding:25px;
transition:0.3s;
cursor:pointer;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.app:hover{
transform:translateY(-8px) scale(1.03);
background:rgba(51,65,85,0.95);
box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

.icon{font-size:48px;margin-bottom:10px;}
a{text-decoration:none;color:white;}
.footer{margin-top:20px;padding:20px;opacity:0.7;}

#installBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
display:none;
z-index:999;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

</style>
</head>

<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>

/* SCRIPT LAMA TETAP */

function playSound(){
document.getElementById("clickSound").play();
}

const lines=[
"> Initializing system...",
"> Connecting...",
"> Access granted ✔",
"> Loading Dashboard..."
];

let i=0,j=0;
function type(){
if(i<lines.length){
if(j<lines[i].length){
document.getElementById("text").innerHTML+=lines[i][j];
j++;
setTimeout(type,40);
}else{
document.getElementById("text").innerHTML+="<br>";
i++;j=0;
setTimeout(type,300);
}
}else{
setTimeout(()=>{loader.style.display="none";},800);
}}
type();

/* STARS */
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2,d:Math.random()});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
for(let s of stars){
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
s.y+=s.d;
if(s.y>canvas.height)s.y=0;
}}
setInterval(draw,33);

/* INSTALL */
let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.onclick=async()=>{
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
}
};

/* AUTO UPDATE */
if("serviceWorker" in navigator){
navigator.serviceWorker
.register("sw.js?v="+Date.now())
.then(reg=>{
reg.update();
setInterval(()=>reg.update(),60000);
});
}

</script>

</body>
