background-size:cover;
background-position:center;
background-repeat:no-repeat;

color:white;
text-align:center;
margin:0;

/* OVERLAY */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
rgba(0,0,0,0.6),
rgba(0,0,0,0.8)

padding:40px 20px 10px;

.sub{
opacity:0.8;
margin-bottom:20px;

}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

/* CARD */
.app{
background:rgba(30,41,59,0.75);
border-radius:20px;
padding:25px;
transition:all 0.3s ease;
cursor:pointer;

backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* HOVER EFFECT */
.app:hover{
background:rgba(51,65,85,0.9);
transform:translateY(-8px) scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* ICON */
.icon{
font-size:48px;
margin-bottom:12px;
}

/* LINK */
a{
text-decoration:none;
color:white;
}

/* FOOTER */
.footer{
margin-top:20px;
padding:20px;
opacity:0.7;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:600px){
.header{
font-size:28px;
}
.grid{
padding:20px;
gap:15px;
}
}

</style>
