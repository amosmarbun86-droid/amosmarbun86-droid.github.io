<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AMOS WEB OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Consolas, monospace;
color:#00ff9f;
overflow:hidden;
background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

/* LOGIN */
#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:30px;
border:1px solid #00ff9f;
text-align:center;
}

/* DESKTOP */
#desktop{
display:none;
width:100vw;
height:100vh;
}

/* ICON */
.icon{
width:90px;
text-align:center;
cursor:pointer;
margin:10px;
display:inline-block;
}

/* WINDOW */
.window{
position:absolute;
width:600px;
height:350px;
background:black;
border:1px solid #00ff9f;
display:none;
box-shadow:0 0 10px #00ff9f55;
}

.titlebar{
background:#001a12;
padding:5px;
display:flex;
justify-content:space-between;
cursor:move;
}

.controls button{
background:black;
color:#00ff9f;
border:none;
cursor:pointer;
margin-left:5px;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:35px;
background:black;
display:flex;
justify-content:space-between;
padding:5px;
border-top:1px solid #00ff9f;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h3>AMOS WEB OS LOGIN</h3>
<input type="password" id="pass" placeholder="Password">
<br><br>
<button onclick="login()">LOGIN</button>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- PROJECT ICONS -->
<div class="icon" onclick="openExternal('https://amosmarbun86-droid.github.io/camera-Rcp-pro/')">📸<br>Camera</div>
<div class="icon" onclick="openExternal('https://amosmarbun86-droid.github.io/fake-gps-map/')">🗺<br>Fake GPS</div>
<div class="icon" onclick="openExternal('https://amosmarbun86-droid.github.io/cv-amos/')">👨‍💻<br>CV Amos</div>
<div class="icon" onclick="openExternal('https://amosmarbun86-droid.github.io/data-pribadi/')">📂<br>Data</div>
<div class="icon" onclick="openExternal('https://amosmarbun86-droid.github.io/data-pribadi/admin.html')">🔐<br>Admin</div>
<div class="icon" onclick="openExternal('https://amosmarbun86-droid.github.io/smartdebt-system/')">💰<br>SmartDebt</div>
<div class="icon" onclick="openExternal('https://alarm-telegram-24jam.onrender.com')">🚨<br>Alarm</div>
<div class="icon" onclick="openExternal('https://jadwal-kerja-eqhfsftfwps6axdunrghan.streamlit.app')">📅<br>Jadwal</div>
<div class="icon" onclick="openExternal('https://amosmarbun86-droid-form-wilayah-spx-sbb-mainkode-wemahi.streamlit.app/')">📍<br>Form</div>
<div class="icon" onclick="openExternal('https://t.me/routealarmsiborong2026_bot')">🤖<br>Telegram</div>

<!-- INTERNAL APPS -->
<div class="icon" onclick="openApp('notes')">📝<br>Notes</div>
<div class="icon" onclick="openApp('music')">🎵<br>Music</div>
<div class="icon" onclick="openApp('terminal')">💻<br>Terminal</div>

</div>

<!-- NOTES -->
<div class="window" id="notes">
<div class="titlebar" onmousedown="dragStart(event,'notes')">
Notes
<div class="controls">
<button onclick="minimizeApp('notes')">—</button>
<button onclick="maximizeApp('notes')">⬜</button>
<button onclick="closeApp('notes')">✕</button>
</div>
</div>
<textarea id="notesArea" style="width:100%;height:90%;background:black;color:#0f0;"></textarea>
</div>

<!-- MUSIC -->
<div class="window" id="music">
<div class="titlebar" onmousedown="dragStart(event,'music')">
Music
<div class="controls">
<button onclick="minimizeApp('music')">—</button>
<button onclick="maximizeApp('music')">⬜</button>
<button onclick="closeApp('music')">✕</button>
</div>
</div>
<select onchange="changeMusic(this.value)" style="width:100%">
<option value="">Pilih Lagu</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Track 1</option>
<option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Track 2</option>
</select>
<audio id="player" controls style="width:100%"></audio>
</div>

<!-- TERMINAL -->
<div class="window" id="terminal">
<div class="titlebar" onmousedown="dragStart(event,'terminal')">
Terminal
<div class="controls">
<button onclick="minimizeApp('terminal')">—</button>
<button onclick="maximizeApp('terminal')">⬜</button>
<button onclick="closeApp('terminal')">✕</button>
</div>
</div>
<div id="terminalOutput" style="height:80%;overflow:auto"></div>
<input id="cmdInput" style="width:100%;background:black;color:#0f0;border:none"
onkeydown="runCmd(event)">
</div>

<!-- TASKBAR -->
<div id="taskbar">
<div>AMOS WEB OS</div>
<div id="clock"></div>
</div>

<script>
/* LOGIN */
function login(){
if(document.getElementById("pass").value==="123"){
document.getElementById("login").style.display="none";
document.getElementById("desktop").style.display="block";
}else{
alert("Password salah");
}
}

/* OPEN EXTERNAL */
function openExternal(url){
window.open(url,"_blank");
}

/* WINDOW CONTROL */
function openApp(id){
document.getElementById(id).style.display="block";
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

function minimizeApp(id){
document.getElementById(id).style.display="none";
}

function maximizeApp(id){
let win=document.getElementById(id);
win.style.top="0";
win.style.left="0";
win.style.width="100%";
win.style.height="90%";
}

/* DRAG WINDOW */
let dragObj=null;
let offsetX, offsetY;

function dragStart(e,id){
dragObj=document.getElementById(id);
offsetX=e.clientX-dragObj.offsetLeft;
offsetY=e.clientY-dragObj.offsetTop;
document.onmousemove=dragMove;
document.onmouseup=dragStop;
}

function dragMove(e){
if(dragObj){
dragObj.style.left=(e.clientX-offsetX)+"px";
dragObj.style.top=(e.clientY-offsetY)+"px";
}
}

function dragStop(){
document.onmousemove=null;
dragObj=null;
}

/* NOTES SAVE */
notesArea.value=localStorage.getItem("amos_notes")||"";
notesArea.addEventListener("input",()=>{
localStorage.setItem("amos_notes",notesArea.value);
});

/* MUSIC */
function changeMusic(src){
document.getElementById("player").src=src;
document.getElementById("player").play();
}

/* TERMINAL */
function runCmd(e){
if(e.key==="Enter"){
let cmd=cmdInput.value;
let out=document.getElementById("terminalOutput");

if(cmd==="help") out.innerHTML+="<br>help time clear about";
else if(cmd==="time") out.innerHTML+="<br>"+new Date();
else if(cmd==="about") out.innerHTML+="<br>AMOS WEB OS";
else if(cmd==="clear"){ out.innerHTML=""; cmdInput.value=""; return;}
else out.innerHTML+="<br>Command not found";

cmdInput.value="";
}
}

/* CLOCK */
setInterval(()=>{
document.getElementById("clock").innerHTML=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
