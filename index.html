<button onclick="confirmNo()">NO</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIza...",
authDomain:"amos-web-os.firebaseapp.com",
projectId:"amos-web-os"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const player=document.getElementById("player");
let musicData = [];
let currentIndex = 0;
let isShuffle = false;
const musicTitle = document.getElementById("musicTitle");
const cover = document.getElementById("cover");
const musicList=document.getElementById("musicList");
const musicFile=document.getElementById("musicFile");
const fileManagerContent=document.getElementById("fileManagerContent");
const clock=document.getElementById("clock");
const startMenu=document.getElementById("startMenu");

const pass=document.getElementById("pass");
const desktop=document.getElementById("desktop");
const loginBox=document.getElementById("login");

function login(){
if(pass.value==="123"){
loginBox.style.display="none";
desktop.style.display="flex";
loadFiles();
loadMusic();
}else alert("PIN salah");
}

function openApp(id){

let w=document.getElementById(id);
w.style.display="block";

if(id==="fileManager") loadFiles();
if(id==="music") loadMusic();

/* AUTO FOCUS TERMINAL */
if(id==="terminal"){
setTimeout(()=>{
document.getElementById("cmdInput").focus();
},300);
}

}

function closeApp(id){
document.getElementById(id).style.display="none";
}

function openExternal(url){
window.open(url,"_blank");
}

/* MUSIC PRO */
function loadMusic(){
musicList.innerHTML="";
musicData = []; // 🔥 WAJIB;
db.collection("files").where("folder","==","music").get().then(snap=>{
let i = 0;

snap.forEach(doc=>{
let d = doc.data();

/* simpan ke array */
musicData.push({
id: doc.id,
name: d.name,
url: d.url,
cover: d.cover || "https://via.placeholder.com/300x200?text=AMOS+MUSIC"
});

/* UI */
let div = document.createElement("div");
div.className = "music-item";

div.innerHTML = `▶ ${d.name}
<button onclick="event.stopPropagation(); editMusic('${doc.id}','${d.name}')">✏️</button>
<button onclick="event.stopPropagation(); deleteMusic('${doc.id}')">❌</button>`;

/* 🔥 FIX INDEX */
let current = i;

div.onclick = ()=>{
playMusic(current);
};

musicList.appendChild(div);

i++; // 🔥 naik manual
});
});
}

function loadTrash(){
musicList.innerHTML="";
db.collection("files").where("folder","==","trash").get().then(snap=>{
snap.forEach((doc, index)=>{
let d = doc.data();

/* 🔥 SIMPAN DATA */
musicData.push({
id: doc.id,
name: d.name,
url: d.url,
cover: d.cover || "https://via.placeholder.com/300x200?text=AMOS+MUSIC"
});
let div=document.createElement("div");

div.innerHTML=`🗑️ ${d.name}
<button onclick="restoreMusic('${doc.id}')">♻️</button>
<button onclick="deletePermanent('${doc.id}')">🔥</button>`;

musicList.appendChild(div);
});
});
}

musicFile.onchange=function(){
const file=this.files[0];
if(file){
player.src=URL.createObjectURL(file);
player.play();
}
};

function addMusicUrl(){
let url=document.getElementById("musicUrl").value;
if(!url)return alert("Masukkan URL");
let name=prompt("Nama lagu:");
if(!name)return;
db.collection("files").add({folder:"music",name,url}).then(loadMusic);
}

function editMusic(id,name){
let n=prompt("Edit:",name);
if(!n)return;
db.collection("files").doc(id).update({name:n}).then(loadMusic);
}

function deleteMusic(id){
showConfirm("Ke Trash?",()=>{
db.collection("files").doc(id).update({folder:"trash"}).then(loadMusic);
});
}

function restoreMusic(id){
db.collection("files").doc(id).update({folder:"music"}).then(loadMusic);
}

function deletePermanent(id){
showConfirm("Hapus permanen?",()=>{
db.collection("files").doc(id).delete().then(loadMusic);
});
}

 
/* =========================
   🎵 PLAY MUSIC (FINAL SAFE)
========================= */
function playMusic(i){

if(!musicData || musicData.length === 0){
alert("Playlist kosong");
return;
}

/* batas aman index */
if(i < 0 || i >= musicData.length){
return;
}

currentIndex = i;

let song = musicData[currentIndex];

if(!song){
alert("Song error");
return;
}

player.src = song.url;

/* autoplay fix */
player.play().catch(()=>{
console.log("Autoplay diblok browser");
});

musicTitle.innerText = song.name || "Tanpa Judul";

/* cover optional (tidak wajib ada) */
if(typeof cover !== "undefined" && cover){
cover.src = song.cover || "https://via.placeholder.com/300x200";
}

/* highlight lagu aktif */
document.querySelectorAll(".music-item").forEach((el, index)=>{
el.classList.toggle("active", index === currentIndex);
});
}


/* =========================
   ⏭ NEXT (SUPPORT SHUFFLE)
========================= */
function nextMusic(){

if(!musicData || musicData.length === 0) return;

if(isShuffle){
/* 🔀 RANDOM */
currentIndex = Math.floor(Math.random() * musicData.length);
}else{
/* NORMAL LOOP */
currentIndex = (currentIndex + 1) % musicData.length;
}

playMusic(currentIndex);
}


/* =========================
   ⏮ PREV (STABIL)
========================= */
function prevMusic(){

if(!musicData || musicData.length === 0) return;

/* loop mundur */
currentIndex = (currentIndex - 1 + musicData.length) % musicData.length;

playMusic(currentIndex);
}


/* =========================
   🔀 SHUFFLE
========================= */
function toggleShuffle(){

isShuffle = !isShuffle;

alert("Shuffle: " + (isShuffle ? "ON 🔀" : "OFF"));
}


/* =========================
   🔥 AUTO NEXT (FINAL)
========================= */
player.onended = function(){
nextMusic();
};
/* FILE MANAGER (tetap) */
let currentFolder="note";
function loadFiles(){
fileManagerContent.innerHTML="Folder: "+currentFolder+"<hr>";
db.collection("files").where("folder","==",currentFolder).get().then(snap=>{
snap.forEach(doc=>{
let d=doc.data();
let div=document.createElement("div");
div.className="file";
div.textContent=d.name;
fileManagerContent.appendChild(div);
});
});
}

function createFile(){
let name=prompt("Nama file:");
let content=prompt("Isi:");
if(!name)return;
db.collection("files").add({folder:currentFolder,name,content}).then(loadFiles);
}

function switchFolder(f){
currentFolder=f;
loadFiles();
}

/* CLOCK */
setInterval(()=>{clock.innerHTML=new Date().toLocaleTimeString();},1000);

/* START */
function toggleStart(){
startMenu.style.display=startMenu.style.display==="flex"?"none":"flex";
}

/* MATRIX (tetap) */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let columns=canvas.width/20;
let drops=[];
for(let i=0;i<columns;i++)drops[i]=1;
let showMatrix=true;

function toggleBgEffect(){showMatrix=!showMatrix;}

function drawMatrix(){
if(!showMatrix){
ctx.clearRect(0,0,canvas.width,canvas.height);
requestAnimationFrame(drawMatrix);
return;
}
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0f0";
ctx.font="15px monospace";

for(let i=0;i<drops.length;i++){
let text=String.fromCharCode(33+Math.random()*94);
ctx.fillText(text,i*20,drops[i]*20);
if(drops[i]*20>canvas.height) drops[i]=0;
drops[i]++;
}
requestAnimationFrame(drawMatrix);
}
drawMatrix();

/* CONFIRM */
let confirmCallback=null;
function showConfirm(text,cb){
confirmCallback=cb;
document.getElementById("confirmText").innerText=text;
document.getElementById("confirmBox").style.display="flex";
}
function confirmYes(){if(confirmCallback)confirmCallback();confirmBox.style.display="none";}
function confirmNo(){confirmBox.style.display="none";}
</script>
<script>








/* =====================================
   AMOS AI OS — FINAL STABLE BUILD V13
===================================== */

let aiBusy=false;

let aiMemory={
name:null
};

/* ========= TERMINAL OUTPUT ========= */

function printTerminal(text){

const out=document.getElementById("terminalOutput");
if(!out) return;

const line=document.createElement("div");
line.innerHTML=text;

out.appendChild(line);
out.scrollTop=out.scrollHeight;
}


/* ========= LOCAL AI BACKUP ========= */

function localAI(text){

text=text.toLowerCase();

if(text.includes("halo"))
return "Halo 👋 AMOS AI siap membantu.";

if(text.includes("siapa kamu"))
return "Saya AMOS AI Terminal V13.";

if(text.includes("status"))
return "✅ AMOS WEB OS berjalan normal.";

return "Perintah diterima.";
}


/* ========= AI BRAIN (INTENT SYSTEM) ========= */

function aiBrain(text){

text=text.toLowerCase();

/* MEMORY SAVE */
if(text.includes("ingat nama saya")){

let name=text.replace("ingat nama saya","").trim();

if(name){
aiMemory.name=name;
printTerminal("AI: Baik, saya ingat nama kamu "+name);
}
return;
}

/* MEMORY READ */
if(text.includes("nama saya siapa")){
if(aiMemory.name)
printTerminal("AI: Nama kamu "+aiMemory.name);
else
printTerminal("AI: Saya belum tahu nama kamu.");
return;
}

/* STATUS */
if(text.includes("status")){
printTerminal("AI: ✅ Sistem berjalan normal.");
return;
}

/* MUSIC */
if(text.includes("musik") || text.includes("lagu")){
openApp("music");
printTerminal("AI: Membuka Music Player 🎵");
return;
}

/* NOTES */
if(text.includes("notes") || text.includes("catatan")){
openApp("notes");
printTerminal("AI: Membuka Notes 📝");
return;
}

/* TERMINAL */
if(text.includes("terminal")){
openApp("terminal");
return;
}

/* MATRIX */
if(text.includes("matrix off") || text.includes("matikan matrix")){
toggleBgEffect();
printTerminal("AI: Matrix dimatikan.");
return;
}

}


/* ========= OS CONTROL ========= */

function aiControl(text){

text=text.toLowerCase();

if(text.includes("buka notes"))
openApp("notes");

else if(text.includes("buka music"))
openApp("music");

else if(text.includes("buka terminal"))
openApp("terminal");

else if(text.includes("buka file"))
openApp("fileManager");

else if(text.includes("tutup notes"))
closeApp("notes");

else if(text.includes("tutup terminal"))
closeApp("terminal");

}


/* ========= AI ENGINE ========= */

async function askAI(question){

if(aiBusy) return;
aiBusy=true;

printTerminal("You: "+question);

/* 🔥 EXECUTE LOCAL INTENT DULU */
aiBrain(question);
aiControl(question);

printTerminal("AI thinking...");

try{

const res=await fetch(
"https://api.affiliateplus.xyz/api/chatbot?message="
+encodeURIComponent(question)
);

if(!res.ok) throw new Error("offline");

const data=await res.json();

let reply=data.message || localAI(question);

printTerminal("AI: "+reply);

/* EXECUTION */
aiBrain(question);
aiBrain(reply);

aiControl(question);
aiControl(reply);

}catch(e){

console.log("Public AI gagal → Local aktif");

let reply=localAI(question);

printTerminal("AI(Local): "+reply);

aiBrain(reply);
aiControl(reply);

}

aiBusy=false;

/* AUTO FOCUS */
document.getElementById("cmdInput").focus();

}


/* ========= TERMINAL LISTENER (SAFE LOAD) ========= */

window.addEventListener("DOMContentLoaded",()=>{

const input=document.getElementById("cmdInput");

if(!input) return;

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let cmd=this.value.trim();
this.value="";

if(cmd!==""){
askAI(cmd);
}

}

});

}); // ← PENUTUP DOMContentLoaded


</script>
