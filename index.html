<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AMOS WEB OS V6</title>

<style>
body{
margin:0;
font-family:Consolas, monospace;
background:black;
color:#00ff9f;
overflow:hidden;
}

/* BOOT */
#boot{
position:fixed;
width:100%;
height:100%;
background:black;
padding:20px;
z-index:999;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:#020617;
z-index:998;
}

/* DESKTOP */
#desktop{
display:none;
width:100%;
height:100vh;
position:relative;
}

/* ICON */
.icon{
width:80px;
text-align:center;
cursor:pointer;
display:inline-block;
margin:15px;
}

/* WINDOW */
.window{
position:absolute;
width:600px;
height:350px;
background:#020617;
border:1px solid #00ff9f;
display:none;
}

.titlebar{
background:black;
padding:5px;
cursor:move;
display:flex;
justify-content:space-between;
}

iframe{
width:100%;
height:calc(100% - 25px);
border:none;
}

/* TASKBAR */
#taskbar{
position:absolute;
bottom:0;
width:100%;
height:35px;
background:#020617;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
border-top:1px solid #00ff9f33;
}

/* TERMINAL */
#terminalOutput{
height:85%;
overflow:auto;
}

/* MATRIX */
canvas{
position:fixed;
z-index:-1;
}
</style>
</head>

<body>

<div id="boot"></div>

<div id="login">
<div>

<input id="pass" type="password">
<button onclick="login()">ENTER</button>
</div>
</div>

<div id="desktop">

<!-- DESKTOP ICONS -->

<div class="icon" onclick="openApp('bot')">🤖<br>Telegram</div>
<div class="icon" onclick="openApp('alarm')">🚨<br>Alarm</div>
<div class="icon" onclick="openApp('form')">📍<br>Form</div>
<div class="icon" onclick="openApp('data')">📂<br>Data</div>
<div class="icon" onclick="openApp('admin')">🔐<br>Admin</div>
<div class="icon" onclick="openApp('debt')">💰<br>SmartDebt</div>
<div class="icon" onclick="openApp('notes')">📝<br>Notes</div>
<div class="icon" onclick="openApp('music')">🎵<br>Music</div>
<div class="icon" onclick="openApp('terminal')">💻<br>Terminal</div>

<!-- WINDOWS PROJECT -->

<div class="titlebar">Form Wilayah <span onclick="closeApp('form')">X</span></div>

<!-- NOTES -->
<div class="window" id="notes">
<div class="titlebar">Notes <span onclick="closeApp('notes')">X</span></div>
<textarea style="width:100%;height:90%;background:black;color:#0f0;"></textarea>
</div>

<!-- MUSIC -->
<div class="window" id="music">
<div class="titlebar">Music <span onclick="closeApp('music')">X</span></div>
<audio controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<!-- TERMINAL -->
<div class="window" id="terminal">
<div class="titlebar">Terminal <span onclick="closeApp('terminal')">X</span></div>
<div id="terminalOutput"></div>
<input id="cmdInput" style="width:100%;background:black;color:#0f0;" onkeydown="runCmd(event)">
</div>

<div id="taskbar">
<div>AMOS WEB OS V6</div>
<div id="clock"></div>
</div>

</div>

<canvas id="matrix"></canvas>

<script>

/* BOOT */
let boot=["Booting AMOS OS...","Loading system...","Starting services...","Welcome Amos"];
let i=0;
let b=document.getElementById("boot");

let int=setInterval(()=>{
b.innerHTML+=boot[i]+"<br>";
i++;
if(i>=boot.length){
clearInterval(int);
setTimeout(()=>{
b.style.display="none";
document.getElementById("login").style.display="flex";
},1000);
}
},700);

/* LOGIN */
function login(){
if(pass.value=="123"){
login.style.display="none";
desktop.style.display="block";
}else alert("Wrong password");
}

/* WINDOW */
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.top=Math.random()*200+"px";
w.style.left=Math.random()*300+"px";
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

/* DRAG WINDOW */
document.querySelectorAll(".window").forEach(win=>{
let bar=win.querySelector(".titlebar");
bar.onmousedown=e=>{
let x=e.clientX-win.offsetLeft;
let y=e.clientY-win.offsetTop;
document.onmousemove=e=>{
win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";
};
document.onmouseup=()=>document.onmousemove=null;
};
});

/* CLOCK */
setInterval(()=>{
clock.innerHTML=new Date().toLocaleTimeString();
},1000);

/* TERMINAL */
function runCmd(e){
if(e.key==="Enter"){
let cmd=cmdInput.value;
terminalOutput.innerHTML+="<br>> "+cmd;
cmdInput.value="";
}
}

/* MATRIX */
let c=document.getElementById("matrix");
let ctx=c.getContext("2d");
c.width=window.innerWidth;
c.height=window.innerHeight;
let letters="01";
let drops=[];
for(let i=0;i<100;i++)drops[i]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle="#0f0";
for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*10,drops[i]*10);
drops[i]++;
if(drops[i]*10>c.height) drops[i]=0;
}
}
setInterval(draw,33);

</script>

</body>
</html>
