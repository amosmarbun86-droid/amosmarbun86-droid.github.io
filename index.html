<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AMOS WEB OS V14 PRO FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff9f">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ================= GLOBAL ================= */
body{
    margin:0;
    font-family:Consolas, monospace;
    background:black;
    color:#00ff9f;
    overflow:hidden;
}
button{
    cursor:pointer;
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f;
    padding:5px 10px;
}
button:hover{background:#00ff9f;color:black}
input, textarea{
    background:black;
    color:#00ff9f;
    border:1px solid #00ff9f;
    padding:5px;
}

/* MATRIX BACKGROUND */
#bgCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

/* LOGIN */
#login{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.95);
    z-index:999;
}

/* DESKTOP */
#desktop{
    display:none;
    width:100%;
    height:100vh;
}

/* SIDEBAR */
#sidebar{
    width:220px;
    background:rgba(0,2,23,0.95);
    border-right:1px solid #00ff9f55;
    padding:10px;
    overflow:auto;
    transition:transform 0.3s;
}
.side-item{
    padding:10px;
    border-bottom:1px solid #003322;
    cursor:pointer;
}
.side-item:hover{background:#001a12}

/* MOBILE SIDEBAR */
#toggleSidebar{
    position:fixed;
    top:10px;
    left:10px;
    z-index:1001;
    display:none;
}
@media(max-width:768px){
    #toggleSidebar{display:block;}
    #sidebar{
        position:fixed;
        height:100%;
        transform:translateX(-100%);
        z-index:1000;
    }
    #sidebar.active{transform:translateX(0);}
}

/* WORKSPACE */
#workspace{
    flex:1;
    position:relative;
}

/* WINDOWS */
.window{
    position:absolute;
    width:90%;
    max-width:650px;
    height:75%;
    background:rgba(0,2,23,0.95);
    border:1px solid #00ff9f;
    display:none;
    flex-direction:column;
}
.titlebar{
    background:black;
    padding:5px;
    display:flex;
    justify-content:space-between;
    cursor:move;
}

/* TERMINAL */
#terminalOutput{
    flex:1;
    overflow:auto;
    padding:10px;
    background:black;
}
#cmdInput{
    width:100%;
    border:none;
    padding:5px;
    background:black;
    color:#00ff9f;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,2,23,0.95);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
}

/* START MENU */
#startMenu{
    position:absolute;
    bottom:40px;
    left:0;
    width:200px;
    background:black;
    display:none;
    flex-direction:column;
}

/* MUSIC */
#musicList{overflow:auto;flex:1}
.music-item{
    padding:8px;
    border-bottom:1px solid #003322;
}
.music-item:hover{background:#001a12}

/* FLOATING PLAYER */
.floating-player{
    position:fixed;
    bottom:80px;
    right:10px;
    background:black;
    border:1px solid #00ff9f;
    padding:10px;
    border-radius:10px;
    display:none;
    z-index:9999;
}

/* CONFIRM BOX */
#confirmBox{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- LOGIN -->
<div id="login">
    <h2>AMOS LOGIN</h2>
    <input type="password" id="pass" placeholder="PIN 123">
    <br><br>
    <button onclick="login()">ENTER</button>
</div>

<!-- DESKTOP -->
<div id="desktop">
    <button id="toggleSidebar" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h3>PROJECTS</h3>
        <div class="side-item" onclick="openApp('notes')"><i class="fa fa-note-sticky"></i> Notes</div>
        <div class="side-item" onclick="openApp('music')"><i class="fa fa-music"></i> Music</div>
        <div class="side-item" onclick="openApp('terminal')"><i class="fa fa-terminal"></i> Terminal</div>
        <div class="side-item" onclick="openApp('fileManager')"><i class="fa fa-folder"></i> File Manager</div>
        <hr>
        <div class="side-item" onclick="logout()"><i class="fa fa-sign-out-alt"></i> Logout</div>
    </div>

    <!-- WORKSPACE -->
    <div id="workspace">

        <!-- NOTES -->
        <div class="window" id="notes">
            <div class="titlebar">Notes <span onclick="closeApp('notes')">X</span></div>
            <textarea style="flex:1;"></textarea>
        </div>

        <!-- TERMINAL -->
        <div class="window" id="terminal">
            <div class="titlebar">Terminal <span onclick="closeApp('terminal')">X</span></div>
            <div id="terminalOutput"></div>
            <input id="cmdInput" placeholder="Ketik perintah..." />
        </div>

        <!-- MUSIC -->
        <div class="window" id="music">
            <div class="titlebar">Music <span onclick="closeApp('music')">X</span></div>
            <audio id="player" controls style="width:100%"></audio>

            <div style="padding:10px;">
                <input type="text" id="songName" placeholder="Judul Lagu">
                <input type="text" id="songURL" placeholder="URL Lagu">
                <button onclick="addMusic()">Tambah</button>
                <button onclick="showAllMusic()">Semua</button>
                <button onclick="showFavorites()">Favorit</button>
                <button onclick="showPlaylist()">Playlist</button>
            </div>

            <div id="musicList"></div>
        </div>

        <!-- FILE MANAGER -->
        <div class="window" id="fileManager">
            <div class="titlebar">File Manager <span onclick="closeApp('fileManager')">X</span></div>
            <div id="fileManagerContent" style="padding:10px;">
                Sistem file berbasis Firebase.
            </div>
        </div>

    </div>

    <!-- TASKBAR -->
    <div id="taskbar">
        <div onclick="toggleStart()">Start</div>
        <div id="clock"></div>
    </div>

    <!-- START MENU -->
    <div id="startMenu">
        <div onclick="openApp('notes')">Notes</div>
        <div onclick="openApp('music')">Music</div>
        <div onclick="openApp('terminal')">Terminal</div>
        <div onclick="openApp('fileManager')">File Manager</div>
    </div>
</div>

<!-- FLOATING PLAYER -->
<div id="floatingPlayer" class="floating-player">
    <span id="floatingTitle">Tidak ada lagu</span>
    <button onclick="togglePlay()">▶</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD2QRiYnyHWRqG3OgZcWV9YA1arXPsvoE0",
  authDomain: "amos-web-os.firebaseapp.com",
  projectId: "amos-web-os",
  storageBucket: "amos-web-os.firebasestorage.app",
  messagingSenderId: "59843745100",
  appId: "1:59843745100:web:b29e5996052a3bf5672be9",
  measurementId: "G-Z2F7MXPSCH"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.analytics();

/* LOGIN SYSTEM */
function login(){
    const pin=document.getElementById("pass").value;
    if(pin==="123"){
        document.getElementById("login").style.display="none";
        document.getElementById("desktop").style.display="flex";
        localStorage.setItem("amosLoggedIn","true");
        loadMusic();
    }else alert("PIN salah!");
}

document.addEventListener("DOMContentLoaded",()=>{
    if(localStorage.getItem("amosLoggedIn")==="true"){
        document.getElementById("login").style.display="none";
        document.getElementById("desktop").style.display="flex";
        loadMusic();
    }
    document.getElementById("pass").addEventListener("keydown",e=>{
        if(e.key==="Enter") login();
    });
});

function logout(){
    localStorage.removeItem("amosLoggedIn");
    location.reload();
}

/* UI CONTROL */
function toggleSidebar(){sidebar.classList.toggle("active");}
function openApp(id){document.getElementById(id).style.display="flex";}
function closeApp(id){document.getElementById(id).style.display="none";}
function toggleStart(){
    startMenu.style.display=startMenu.style.display==="flex"?"none":"flex";
}

/* CLOCK */
setInterval(()=>{
    clock.innerHTML=new Date().toLocaleTimeString("id-ID");
},1000);

/* TERMINAL */
cmdInput.addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        let cmd=this.value;
        this.value="";
        terminalOutput.innerHTML+="> "+cmd+"<br>";
        if(cmd==="halo") terminalOutput.innerHTML+="AI: Halo Amos!<br>";
        else if(cmd==="status") terminalOutput.innerHTML+="AI: Sistem normal.<br>";
        else terminalOutput.innerHTML+="AI: Perintah tidak dikenali.<br>";
    }
});

/* MUSIC SYSTEM */
const player=document.getElementById("player");
const musicList=document.getElementById("musicList");
const floatingPlayer=document.getElementById("floatingPlayer");
const floatingTitle=document.getElementById("floatingTitle");

let musicData=[];
let favorites=JSON.parse(localStorage.getItem("favorites"))||[];
let playlist=JSON.parse(localStorage.getItem("playlist"))||[];

function loadMusic(){
    musicData=[];
    musicList.innerHTML="Memuat...";
    db.collection("files").where("folder","==","music").get().then(snap=>{
        snap.forEach(doc=>musicData.push(doc.data()));
        const localMusic=JSON.parse(localStorage.getItem("localMusic"))||[];
        musicData=musicData.concat(localMusic);
        renderMusic(musicData);
    });
}

function renderMusic(list){
    musicList.innerHTML="";
    list.forEach(song=>{
        const div=document.createElement("div");
        div.className="music-item";
        div.innerHTML=`
            ${song.name}
            <div style="float:right;">
                <button onclick='playMusic(${JSON.stringify(song)})'>▶</button>
                <button onclick='addToFavorites(${JSON.stringify(song)})'>★</button>
                <button onclick='addToPlaylist(${JSON.stringify(song)})'>＋</button>
            </div>`;
        musicList.appendChild(div);
    });
}

function playMusic(song){
    player.src=song.url;
    player.play();
    floatingPlayer.style.display="block";
    floatingTitle.innerText=song.name;
}

function togglePlay(){
    if(player.paused) player.play();
    else player.pause();
}

function addMusic(){
    const name=document.getElementById("songName").value;
    const url=document.getElementById("songURL").value;
    if(!name||!url) return alert("Lengkapi data!");

    const song={name,url,folder:"music"};
    let localMusic=JSON.parse(localStorage.getItem("localMusic"))||[];
    localMusic.push(song);
    localStorage.setItem("localMusic",JSON.stringify(localMusic));

    db.collection("files").add(song);
    loadMusic();
}

function addToFavorites(song){
    favorites.push(song);
    localStorage.setItem("favorites",JSON.stringify(favorites));
}

function addToPlaylist(song){
    playlist.push(song);
    localStorage.setItem("playlist",JSON.stringify(playlist));
}

function showFavorites(){renderMusic(favorites);}
function showPlaylist(){renderMusic(playlist);}
function showAllMusic(){renderMusic(musicData);}

/* MATRIX EFFECT */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

let letters="AMOSWEBOS123456789";
let fontSize=16;
let columns=canvas.width/fontSize;
let drops=Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ff9f";
    ctx.font=fontSize+"px monospace";
    for(let i=0;i<drops.length;i++){
        let text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize>canvas.height) drops[i]=0;
        drops[i]++;
    }
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
