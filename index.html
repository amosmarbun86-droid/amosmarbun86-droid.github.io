<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Consolas, monospace;
background:url('https://res.cloudinary.com/dkisbfx29/image/upload/v1775192201/xvl7e4phlhxz3urcq6xl.png') no-repeat center center fixed;
background-size:cover;
color:#00ff9f;
overflow:hidden;
}

#login{
position:fixed;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
z-index:999;
flex-direction:column;
}

#login input, #login button{
padding:10px;
margin:5px;
background:black;
border:1px solid #00ff9f;
color:#0f0;
}

#desktop{
display:none;
width:100vw;
height:100vh;
flex-direction:row;
}

/* SIDEBAR */
#sidebar{
width:220px;
background:rgba(0,2,23,0.9);
border-right:1px solid #00ff9f55;
padding:10px;
overflow:auto;
}

.side-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #003322;
}

.side-item:hover{
background:#001a12;
}

.side-item i{
margin-right:8px;
}

/* WINDOW */
.window{
position:absolute;
width:90%;
max-width:600px;
height:70%;
background:rgba(0,2,23,0.95);
border:1px solid #00ff9f;
display:none;
flex-direction:column;
resize:both;
overflow:auto;
}

.titlebar{
background:black;
padding:5px;
cursor:move;
display:flex;
justify-content:space-between;
}

/* TASKBAR */
#taskbar{
position:absolute;
bottom:0;
width:100%;
height:35px;
background:rgba(0,2,23,0.95);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
}

#startMenu{
position:absolute;
bottom:35px;
left:0;
width:200px;
background:rgba(0,2,23,0.95);
display:none;
flex-direction:column;
}

/* TERMINAL */
textarea, #terminalOutput{
width:100%;
height:calc(100% - 30px);
background:black;
color:#0f0;
border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->

<h2>AMOS LOGIN</h2>

<button onclick="login()">ENTER</button>

<!-- DESKTOP -->
<div id="desktop">

<i class="fa-solid fa-calendar"></i> Jadwal
</div>

<div class="side-item" onclick="openExternal('https://amosmarbun86-droid-form-wilayah-spx-sbb-mainkode-wemahi.streamlit.app/')">
<i class="fa-solid fa-file"></i> Form
</div>

<div class="side-item" onclick="openExternal('https://t.me/routealarmsiborong2026_bot')">
<i class="fa-brands fa-telegram"></i> Telegram Bot
</div>

<hr>

<div class="side-item" onclick="openApp('notes')">Notes</div>
<div class="side-item" onclick="openApp('music')">Music</div>
<div class="side-item" onclick="openApp('terminal')">Terminal</div>
<div class="side-item" onclick="openApp('fileManager')">File Manager</div>

</div>

<div id="workspace">

<div class="window" id="notes">
<div class="titlebar">Notes <span onclick="closeApp('notes')">X</span></div>
<textarea id="notesArea"></textarea>
</div>

<div class="window" id="terminal">
<div class="titlebar">Terminal <span onclick="closeApp('terminal')">X</span></div>
<div id="terminalOutput"></div>
<input id="cmdInput">
</div>

<div class="window" id="music">
<div class="titlebar">Music <span onclick="closeApp('music')">X</span></div>
<input type="file" id="musicFile">
<audio id="player" controls></audio>
</div>

<div class="window" id="fileManager">
<div class="titlebar">File Manager <span onclick="closeApp('fileManager')">X</span></div>
<input type="file" id="fileInput" multiple>
<div id="fileManagerContent"></div>
</div>

</div>

<div id="taskbar">
<div onclick="toggleStart()">Start</div>
<div id="clock"></div>
</div>

<div id="startMenu">
<div onclick="openApp('notes')">Notes</div>
<div onclick="openApp('music')">Music</div>
<div onclick="openApp('terminal')">Terminal</div>
<div onclick="openApp('fileManager')">File Manager</div>
</div>

</div>

<script>
"use strict";

const pass=document.getElementById("pass");
const desktop=document.getElementById("desktop");
const loginBox=document.getElementById("login");

function login(){
if(pass.value==="123"){
loginBox.style.display="none";
desktop.style.display="flex";
}else alert("PIN salah");
}

function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.left=Math.random()*200+"px";
w.style.top=Math.random()*150+"px";
}

function closeApp(id){
document.getElementById(id).style.display="none";
}

function openExternal(url){
window.open(url,"_blank");
}

const cmdInput=document.getElementById("cmdInput");
const terminalOutput=document.getElementById("terminalOutput");

cmdInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
let cmd=cmdInput.value;
if(cmd==="help") terminalOutput.innerHTML+="<br>help,time,clear";
else if(cmd==="time") terminalOutput.innerHTML+="<br>"+new Date();
else if(cmd==="clear") terminalOutput.innerHTML="";
cmdInput.value="";
}
});

setInterval(()=>{
clock.innerHTML=new Date().toLocaleTimeString();
},1000);

function toggleStart(){
startMenu.style.display = startMenu.style.display==="flex"?"none":"flex";
}

document.addEventListener("click",(e)=>{
if(!startMenu.contains(e.target)){
startMenu.style.display="none";
}
});
</script>
