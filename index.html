<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Project Amos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
margin:0;
}

.header{
padding:40px;
font-size:34px;
font-weight:bold;
}

.sub{opacity:.8;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px;
max-width:1100px;
margin:auto;
}

.app{
background:#0f172a;
border-radius:18px;
padding:25px;
transition:.3s;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.5);
}

.app:hover{
transform:translateY(-6px);
background:#1e293b;
}

.icon{
font-size:46px;
margin-bottom:10px;
}

a{
text-decoration:none;
color:white;
}

.footer{
padding:20px;
opacity:.6;
}

#installBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
display:none;
}
</style>
</head>

<body>

<div class="header">🚀 My Project Amos</div>
<div class="sub">Developer Dashboard</div>

<div class="grid">

<a href="https://amosmarbun86-droid.github.io/camera-Rcp-pro/" target="_blank">
<div class="app"><div class="icon">📸</div>Camera RCP PRO</div>
</a>

<a href="https://jadwal-kerja-eqhfsftfwps6axdunrghan.streamlit.app" target="_blank">
<div class="app"><div class="icon">📅</div>Jadwal Kerja</div>
</a>

<a href="https://amosmarbun86-droid.github.io/fake-gps-map/" target="_blank">
<div class="app"><div class="icon">🗺</div>Fake GPS Map</div>
</a>

<a href="https://amosmarbun86-droid.github.io/cv-amos/" target="_blank">
<div class="app"><div class="icon">👨‍💻</div>CV Amos</div>
</a>

<a href="https://amosmarbun86-droid.github.io/data-pribadi/" target="_blank">
<div class="app"><div class="icon">📂</div>Data Pribadi</div>
</a>

</div>

<div class="footer">© 2026 Amos Marbun Projects</div>

<button id="installBtn">⬇ Install App</button>

<script>

/* INSTALL BUTTON */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.onclick=async()=>{
if(deferredPrompt){
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt=null;
}
};

/* AUTO UPDATE SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker
.register("sw.js?v="+Date.now())
.then(reg=>{

// cek update tiap buka
reg.update();

// cek tiap 60 detik
setInterval(()=>{reg.update();},60000);

});
}

</script>

</body>
</html>
