/* LOGIN */

/* DESKTOP */

/* SIDEBAR */

}

}

/* WORKSPACE */
#workspace{

overflow:hidden;
}

/* WINDOW */
.window{

.titlebar{

padding:5px;

}

/* TASKBAR */
#taskbar{

width:100%;

justify-content:space-between;
align-items:center;
padding:0 10px;
border-top:1px solid #00ff9f33;
}
#startBtn{
cursor:pointer;
padding:5px;
border:1px solid #00ff9f;
}
#startMenu{
position:absolute;
bottom:35px;
left:0;
width:200px;
background:rgba(0,2,23,0.95);
display:none;
flex-direction:column;
border:1px solid #00ff9f33;
}
.start-item{
padding:10px;
border-bottom:1px solid #003322;
cursor:pointer;
}
.start-item:hover{
background:#001a12;
}

textarea, #terminalOutput{
width:100%;
height:calc(100% - 30px);
background:black;
color:#0f0;
border:none;

#bgCanvas{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
z-index:0;
pointer-events:none;
}

.file{
padding:6px;
border-bottom:1px solid #003322;
cursor:pointer;

</style>

<div class="start-item">
Color <input type="color" id="windowColorPicker">
</div>

</div>

<script>
"use strict";

/* ELEMENT */
const cmdInput = document.getElementById("cmdInput");
const terminalOutput = document.getElementById("terminalOutput");
const windowColorPicker = document.getElementById("windowColorPicker");

/* LOGIN */
function login(){
if(pass.value==="123"){
loginBox.style.display="none";
desktop.style.display="flex";
cmdInput.focus();
}else alert("PIN salah");
}
const pass=document.getElementById("pass");
const loginBox=document.getElementById("login");
const desktop=document.getElementById("desktop");

/* WINDOW */
function openApp(id){
let w=document.getElementById(id);
w.style.display="block";
w.style.left = (100 + Math.random()*200)+"px";
w.style.top = (50 + Math.random()*150)+"px";
w.style.zIndex=Date.now();
}
function closeApp(id){
document.getElementById(id).style.display="none";
}
function openExternal(url){
window.open(url,"_blank");
}

/* START MENU */
const startBtn=document.getElementById("startBtn");
const startMenu=document.getElementById("startMenu");

startBtn.onclick=()=>{
startMenu.style.display = (startMenu.style.display==="flex")?"none":"flex";
startMenu.style.flexDirection="column";
};

document.addEventListener("click",(e)=>{
if(!startMenu.contains(e.target) && e.target!==startBtn){
startMenu.style.display="none";
}
});

/* CLOCK */
setInterval(()=>{
clock.innerHTML=new Date().toLocaleTimeString();
},1000);
const clock=document.getElementById("clock");

/* TERMINAL */
cmdInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
let cmd=cmdInput.value;
if(cmd==="help") terminalOutput.innerHTML+="<br>help,time,clear";
else if(cmd==="time") terminalOutput.innerHTML+="<br>"+new Date();
else if(cmd==="clear") terminalOutput.innerHTML="";
cmdInput.value="";
}
});

/* COLOR */
windowColorPicker.addEventListener("input",(e)=>{
document.querySelectorAll(".window").forEach(w=>{
w.style.borderColor=e.target.value;
});
});

/* MATRIX */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let columns=canvas.width/20;
let drops=[];
for(let i=0;i<columns;i++)drops[i]=1;
let showMatrix=true;

function toggleBgEffect(){showMatrix=!showMatrix;}

function drawMatrix(){
if(!showMatrix){
ctx.clearRect(0,0,canvas.width,canvas.height);
requestAnimationFrame(drawMatrix);
return;
}
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#0f0";
ctx.font="15px monospace";

for(let i=0;i<drops.length;i++){
let text=String.fromCharCode(33+Math.random()*94);
ctx.fillText(text,i*20,drops[i]*20);
if(drops[i]*20>canvas.height) drops[i]=0;
drops[i]++;
}
requestAnimationFrame(drawMatrix);
}
drawMatrix();

/* MUSIC */
musicFile.onchange=function(){
const file=this.files[0];
if(file){
player.src=URL.createObjectURL(file);
player.play();
}
};

/* FILE */
fileInput.onchange=function(){
fileManagerContent.innerHTML="";
for(const f of this.files){
let d=document.createElement("div");
d.className="file";
d.textContent=f.name;
fileManagerContent.appendChild(d);
}
};
</script>

</body>
